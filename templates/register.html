{% extends 'base.html' %}
{% block content %}
<div class="page-container" style="display: flex; justify-content: center; align-items: center; padding: 40px 20px;">
    
    <div class="form-container" style="width: 100%; max-width: 500px; padding: 40px; border-top: 5px solid #2e1a0f;">
        <h2 style="text-align: center; color: #2e1a0f; margin-top: 0; border-bottom: 2px solid #e0dcd3; padding-bottom: 15px; margin-bottom: 25px;">
            Form Pendaftaran Peneliti
        </h2>
        
        <form action="{{ url_for('register') }}" method="POST">
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Nama Depan:</label>
                    <input type="text" name="nama_depan" required>
                </div>
                <div style="flex: 1;">
                    <label>Nama Belakang:</label>
                    <input type="text" name="nama_belakang" required>
                </div>
            </div>
            
            <label>Alamat Email:</label>
            <input type="email" name="alamat_email" required>
            
            <label>Institusi / Universitas:</label>
            <input type="text" name="institusi" required>
            
            <label>Bidang Keahlian:</label>
            <select name="bidang_keahlian" required>
                <option value="">Pilih Bidang Keahlian...</option>
                <option value="Sejarah">Sejarah</option>
                <option value="Sastra">Sastra</option>
                <option value="Sosiologi">Sosiologi</option>
                <option value="Lainnya">Lainnya</option>
            </select>
            
            <label>Kata Sandi:</label>
            <input type="password" name="kata_sandi" required>
            
            <button type="submit" class="btn-submit" style="background-color: #2e1a0f;">Daftar Sekarang</button>
            
            <div style="text-align: center; margin-top: 20px; font-family: Arial, sans-serif; font-size: 14px;">
                Sudah punya akun? <a href="{{ url_for('login') }}" style="color: #c69c3d; font-weight: bold; text-decoration: none;">Masuk di sini</a>
            </div>
        </form>
    </div>

</div>
{% endblock %}
