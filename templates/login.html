{% extends 'base.html' %}
{% block content %}
<div class="page-container" style="display: flex; justify-content: center; align-items: center; padding: 50px 20px;">
    
    <div class="login-box" style="width: 100%; max-width: 400px; padding: 40px; border-top: 5px solid #2e1a0f;">
        <h2 style="text-align: center; color: #2e1a0f; margin-top: 0; border-bottom: 2px solid #e0dcd3; padding-bottom: 15px; margin-bottom: 25px;">
            Login Peneliti
        </h2>
        
        <form action="{{ url_for('login') }}" method="POST">
            <label>Alamat Email:</label>
            <input type="email" name="alamat_email" required placeholder="Masukkan email terdaftar">
            
            <label>Kata Sandi:</label>
            <input type="password" name="kata_sandi" required placeholder="Masukkan kata sandi">
            
            <button type="submit" class="btn-submit" style="background-color: #2e1a0f;">Masuk</button>
            
            <div style="text-align: center; margin-top: 20px; font-family: Arial, sans-serif; font-size: 14px;">
                Belum punya akun? <a href="{{ url_for('register') }}" style="color: #c69c3d; font-weight: bold; text-decoration: none;">Daftar di sini</a>
            </div>
        </form>
    </div>

</div>
{% endblock %}
